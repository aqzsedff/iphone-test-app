<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Моё первое приложение</title>

<style>

body{
font-family: Arial;
text-align: center;
margin-top: 120px;
background:#f2f2f2;
}

h1{
font-size:32px;
}

#counter{
font-size:40px;
margin:20px;
}

button{
font-size:22px;
padding:15px 25px;
border:none;
border-radius:10px;
background:black;
color:white;
}

</style>

</head>

<body>

<h1>Моё приложение 📱</h1>

<div id="counter">0</div>

<button onclick="add()">+1</button>

<script>

let count = 0;

function add(){
count++;
document.getElementById("counter").innerText = count;
}

</script>

</body>
</html>
